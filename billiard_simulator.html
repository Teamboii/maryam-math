<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billiard Dynamics — Maryam Mirzakhani</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  h1 { font-size: 1.1rem; font-weight: 500; margin-bottom: 4px; color: #f0c060; text-align: center; }
  p.sub { font-size: 0.78rem; color: #aaa; margin-bottom: 14px; text-align: center; }
  canvas { border-radius: 10px; display: block; max-width: 640px; width: 100%; }
  .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin: 10px 0; max-width: 640px; width: 100%; }
  button { background: transparent; border: 1px solid #555; color: #eee; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 13px; }
  button:hover { background: rgba(255,255,255,0.08); }
  label { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #aaa; flex: 1; min-width: 140px; }
  input[type=range] { flex: 1; accent-color: #f0c060; }
  #bouncecount { font-size: 13px; color: #aaa; min-width: 80px; }
  .info { font-size: 12px; color: #999; max-width: 640px; text-align: center; margin-top: 8px; line-height: 1.6; padding: 8px 12px; border-left: 2px solid #444; }
</style>
</head>
<body>
<h1>Billiard Dynamics</h1>
<p class="sub">Maryam Mirzakhani studied how paths like this behave on curved surfaces</p>
<canvas id="bc" width="640" height="260"></canvas>
<div class="controls">
  <button onclick="newLaunch()">New launch ↗</button>
  <button onclick="trailClear()">Clear path</button>
  <label>Speed <input type="range" id="spd" min="1" max="6" value="3" step="1"> <span id="spdv">3</span></label>
  <span id="bouncecount">0 bounces</span>
</div>
<p class="info" id="binfo">Try different speeds — does the path ever perfectly repeat? Maryam proved that on curved hyperbolic surfaces, most paths cover the ENTIRE surface eventually!</p>
<script>
(function(){
  const C = document.getElementById('bc');
  const ctx = C.getContext('2d');
  const W=640,H=260,B=24,BALL_R=7;
  const TX=B,TY=B,TW=W-2*B,TH=H-2*B;
  let trail=[],ball={x:W/2,y:H/2,vx:2.8,vy:2.1},bounces=0;
  function spd(){return parseFloat(document.getElementById('spd').value)*0.7+0.5;}
  window.newLaunch=function(){
    trail=[];bounces=0;
    const a=Math.PI*(0.22+Math.random()*1.56),s=spd();
    ball={x:TX+50+Math.random()*(TW-100),y:TY+30+Math.random()*(TH-60),vx:Math.cos(a)*s,vy:Math.sin(a)*s};
    document.getElementById('binfo').textContent='New path launched! Watch the rainbow trail fill the table.';
  };
  window.trailClear=function(){trail=[];};
  document.getElementById('spd').addEventListener('input',function(){document.getElementById('spdv').textContent=this.value;});
  function frame(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#5E3015';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#196030';ctx.fillRect(TX,TY,TW,TH);
    ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
    for(let y=TY+28;y<TY+TH;y+=28){ctx.beginPath();ctx.moveTo(TX,y);ctx.lineTo(TX+TW,y);ctx.stroke();}
    for(let x=TX+28;x<TX+TW;x+=28){ctx.beginPath();ctx.moveTo(x,TY);ctx.lineTo(x,TY+TH);ctx.stroke();}
    ctx.fillStyle='#0D2E14';
    [[TX,TY],[TX+TW,TY],[TX,TY+TH],[TX+TW,TY+TH]].forEach(([px,py])=>{ctx.beginPath();ctx.arc(px,py,11,0,Math.PI*2);ctx.fill();});
    [[TX+TW/2,TY],[TX+TW/2,TY+TH]].forEach(([px,py])=>{ctx.beginPath();ctx.arc(px,py,9,0,Math.PI*2);ctx.fill();});
    for(let i=1;i<trail.length;i++){
      const h=(i*2.8)%360,t=i/trail.length;
      ctx.globalAlpha=t*0.88;ctx.strokeStyle=`hsl(${h},88%,62%)`;ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(trail[i-1].x,trail[i-1].y);ctx.lineTo(trail[i].x,trail[i].y);ctx.stroke();
    }
    ctx.globalAlpha=1;
    const s=spd(),mag=Math.hypot(ball.vx,ball.vy);
    if(mag>0){ball.vx=ball.vx/mag*s;ball.vy=ball.vy/mag*s;}
    ball.x+=ball.vx;ball.y+=ball.vy;
    const minX=TX+BALL_R+2,maxX=TX+TW-BALL_R-2,minY=TY+BALL_R+2,maxY=TY+TH-BALL_R-2;
    if(ball.x<minX){ball.x=minX;ball.vx=Math.abs(ball.vx);bounces++;}
    if(ball.x>maxX){ball.x=maxX;ball.vx=-Math.abs(ball.vx);bounces++;}
    if(ball.y<minY){ball.y=minY;ball.vy=Math.abs(ball.vy);bounces++;}
    if(ball.y>maxY){ball.y=maxY;ball.vy=-Math.abs(ball.vy);bounces++;}
    trail.push({x:ball.x,y:ball.y});
    if(trail.length>750)trail.shift();
    document.getElementById('bouncecount').textContent=bounces+' bounces';
    ctx.fillStyle='rgba(0,0,0,0.28)';ctx.beginPath();ctx.ellipse(ball.x+2,ball.y+3,BALL_R*1.1,BALL_R*0.4,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#F5DE28';ctx.beginPath();ctx.arc(ball.x,ball.y,BALL_R,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.45)';ctx.beginPath();ctx.arc(ball.x-2.2,ball.y-2.2,BALL_R*0.34,0,Math.PI*2);ctx.fill();
    requestAnimationFrame(frame);
  }
  newLaunch();frame();
})();
</script>
</body>
</html>
